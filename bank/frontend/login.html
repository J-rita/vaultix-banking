<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Vaultix Bank</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body { 
            background: var(--bg-base); 
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-wrap {
            width: 100%;
            max-width: 440px;
            background: var(--bg-white);
            border-radius: var(--radius);
            box-shadow: var(--shadow-md);
            padding: 2.5rem 2.5rem 3rem;
            border: 1px solid var(--border);
        }
        .logo-block {
            text-align: center;
            margin-bottom: 2rem;
        }
        .app-logo {
            width: 56px;
            height: 56px;
            background: var(--primary);
            color: white;
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.75rem;
            font-weight: 800;
            margin-bottom: 1rem;
        }
        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.5rem 0;
            color: var(--text-muted);
            font-size: 0.875rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }
        .back-link {
            position: absolute;
            top: 2rem;
            left: 2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
            font-weight: 500;
            transition: color 0.2s;
        }
        .back-link:hover { color: var(--primary); }
    </style>

    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark-mode');
            document.addEventListener('DOMContentLoaded', () => document.body.classList.add('dark-mode'));
        }
    </script>
</head>
<body>
    <a href="/" class="back-link">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back to Home
    </a>

    <div class="login-wrap">
        <div class="logo-block">
            <div class="app-logo">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            </div>
            <h1 style="font-size: 1.5rem; font-weight: 800; margin-bottom: 0.25rem;">Sign in to Vaultix</h1>
            <p style="color: var(--text-muted); font-size: 0.95rem;">Enter your details below to continue.</p>
        </div>

        <form id="loginForm" autocomplete="off">
            <div class="form-group">
                <label for="username">Username, Email, or Phone</label>
                <input type="text" id="username" placeholder="Enter your username" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required autocomplete="new-password">
            </div>

            <div style="display:flex; justify-content: flex-end; margin-bottom: 1.5rem;">
                <a href="#" style="font-size: 0.85rem; color: var(--primary); text-decoration: none; font-weight: 600;">Forgot Password?</a>
            </div>

            <button type="submit" class="btn btn-primary btn-full">Sign In</button>
        </form>

        <div class="divider">New to Vaultix?</div>

        <a href="/register.html" class="btn btn-outline btn-full">Create an Account</a>
    </div>

    <script src="/static/js/auth.js"></script>
    <script>
        window.addEventListener('pageshow', function () {
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
        });
    </script>
</body>
</html>
