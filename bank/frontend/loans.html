<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loans | Vaultix Bank</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .loan-hero {
            background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%);
            color: white;
            border-radius: var(--radius);
            padding: 2.5rem;
            margin-bottom: 2rem;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(109, 40, 217, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .loan-hero::after {
            content: '';
            position: absolute;
            top: -50px; right: -50px;
            width: 250px; height: 250px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
        }
        .loan-badge {
            font-size: 0.85rem; font-weight: 700;
            background: rgba(255,255,255,0.2);
            display: inline-block; padding: 0.35rem 1rem;
            border-radius: 99px; margin-top: 1rem;
        }
    </style>
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark-mode');
            document.addEventListener('DOMContentLoaded', () => document.body.classList.add('dark-mode'));
        }
    </script>
</head>
<body>
    <div class="web-app">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                <span>Vaultix</span>
            </div>
            <nav class="sidebar-nav">
                <a href="/dashboard.html" class="nav-link">
                    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                    Dashboard
                </a>
                <a href="/transfers.html" class="nav-link">
                    <svg viewBox="0 0 24 24"><path d="M17 3l.001 2c0 3.313-2.687 6-6 6H3"/><path d="M7 6L3 11l4 5"/><path d="M7 21l-.001-2c0-3.313 2.687-6 6-6h8"/><path d="M17 18l4-5-4-5"/></svg>
                    Transfers
                </a>
                <a href="/history.html" class="nav-link">
                    <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                    Transaction History
                </a>
                <a href="/analytics.html" class="nav-link">
                    <svg viewBox="0 0 24 24"><path d="M18 20V10M12 20V4M6 20v-6"></path></svg>
                    Analytics
                </a>
                <a href="/loans.html" class="nav-link active">
                    <svg viewBox="0 0 24 24"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                    Loans
                </a>
            </nav>
            <div class="sidebar-footer">
                <button class="logout-btn" onclick="logout()">
                    <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    Logout
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-area">
            <!-- Topbar -->
            <header class="topbar">
                <div class="topbar-title">Loans & Credit</div>
                <div class="topbar-right">
                    <div style="text-align: right;">
                        <div class="topbar-name" id="userName">User</div>
                        <div class="topbar-role">Customer</div>
                    </div>
                    <div class="topbar-avatar" id="userInitials">U</div>
                </div>
            </header>

            <div class="page-content">
                <div class="loan-hero">
                    <div style="position: relative; z-index: 1;">
                        <h2 style="font-size: 2rem; font-weight: 800; margin-bottom: 0.5rem; letter-spacing: -1px;">Instant Micro-Loans</h2>
                        <p style="font-size: 1.1rem; opacity: 0.9; max-width: 400px;">Get up to ₦500,000 instantly to your account. No paperwork required.</p>
                        <div class="loan-badge">Fixed 5% Interest Rate</div>
                    </div>
                    <svg width="120" height="120" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" style="opacity:0.3; position:relative; z-index:1;"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                </div>

                <div class="grid-2">
                    <!-- Apply Form -->
                    <div class="panel">
                        <div class="panel-header">
                            <span class="panel-title">Apply for a Loan</span>
                        </div>
                        <div class="panel-body">
                            <form id="loanForm">
                                <div class="form-group">
                                    <label>Loan Amount (₦)</label>
                                    <input type="number" id="loanAmount" placeholder="Min. ₦1,000" min="1000" required style="font-size: 1.5rem; font-weight: 700; color: var(--primary);">
                                </div>
                                
                                <div class="form-group">
                                    <label>Repayment Term</label>
                                    <select id="loanTerm">
                                        <option value="6">6 Months @ 5%</option>
                                        <option value="12">12 Months @ 5%</option>
                                        <option value="24">24 Months @ 5%</option>
                                    </select>
                                </div>

                                <button type="submit" class="btn btn-primary btn-full" style="margin-top: 1.5rem;">Apply & Receive Instantly</button>
                            </form>
                        </div>
                    </div>

                    <!-- My Loans -->
                    <div class="panel">
                        <div class="panel-header">
                            <span class="panel-title">My Active Loans</span>
                        </div>
                        <div class="panel-body" style="padding: 0;">
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th>Amount</th>
                                        <th>Term</th>
                                        <th>Date</th>
                                        <th>Status</th>
                                    </tr>
                                </thead>
                                <tbody id="loanHistory">
                                    <tr><td colspan="4" style="text-align:center;">Loading loans...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/login.html';

        function logout() {
            localStorage.clear();
            window.location.href = '/login.html';
        }

        document.addEventListener('DOMContentLoaded', () => {
            const userNameStr = localStorage.getItem('user_name') || 'User';
            document.getElementById('userName').textContent = userNameStr;
            const parts = userNameStr.split(' ');
            document.getElementById('userInitials').textContent = (parts[0][0] + (parts[1] ? parts[1][0] : '')).toUpperCase();
            fetchLoans();
        });

        async function fetchLoans() {
            try {
                const res = await fetch('/api/loans/my-loans', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                const container = document.getElementById('loanHistory');
                container.innerHTML = '';
                
                if (data.status === 'success' && data.loans.length > 0) {
                    container.innerHTML = data.loans.map(loan => {
                        const date = new Date(loan.CREATED_AT).toLocaleDateString();
                        const statusClass = loan.STATUS === 'Approved' ? 'badge-success' : 
                                            loan.STATUS === 'Pending' ? 'badge-warning' : 'badge-danger';
                        return `
                            <tr>
                                <td style="font-weight:700; font-size:1.1rem;">₦${loan.AMOUNT.toLocaleString()}</td>
                                <td>${loan.TERM_MONTHS} Months</td>
                                <td style="color:var(--text-muted);">${date}</td>
                                <td><span class="badge ${statusClass}">${loan.STATUS}</span></td>
                            </tr>
                        `;
                    }).join('');
                } else {
                    container.innerHTML = '<tr><td colspan="4" style="text-align: center; padding: 2rem; color: var(--text-muted);">No active loans found.</td></tr>';
                }
            } catch(e) {}
        }

        document.getElementById('loanForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.textContent = 'Processing...';

            const amount = document.getElementById('loanAmount').value;
            const term = document.getElementById('loanTerm').value;

            try {
                const res = await fetch('/api/loans/apply', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ amount, term_months: term })
                });
                const result = await res.json();
                if (result.status === 'success') {
                    alert(result.message);
                    document.getElementById('loanAmount').value = '';
                    fetchLoans();
                } else {
                    alert("Error: " + result.detail);
                }
            } catch (err) {
                alert("Network error.");
            } finally {
                btn.disabled = false;
                btn.textContent = 'Apply & Receive Instantly';
            }
        });
    </script>
</body>
</html>
