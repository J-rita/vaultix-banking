<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Vaultix</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark-mode');
            document.addEventListener('DOMContentLoaded', () => document.body.classList.add('dark-mode'));
        }
    </script>
</head>
<body>
    <div class="web-app">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                <span>Vaultix</span>
            </div>
            <nav class="sidebar-nav">
                <a href="/admin.html" class="nav-link active">
                    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                    Admin Console
                </a>
            </nav>
            <div class="sidebar-footer">
                <button class="logout-btn" onclick="logout()">
                    <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    Logout
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-area">
            <!-- Topbar -->
            <header class="topbar">
                <div class="topbar-title">Admin Console</div>
                <div class="topbar-right">
                    <div style="text-align: right;">
                        <div class="topbar-name" id="userName">Administrator</div>
                        <div class="topbar-role">Admin</div>
                    </div>
                    <div class="topbar-avatar" id="userInitials">AD</div>
                </div>
            </header>

            <div class="page-content">
                <!-- Stats Row -->
                <div class="stats-row">
                    <div class="stat-card">
                        <div class="stat-icon" style="background: #e0e7ff; color: #4338ca;">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle></svg>
                        </div>
                        <div>
                            <div class="stat-label">Total Users</div>
                            <div class="stat-value" id="totalUsers">0</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background: #fef3c7; color: #d97706;">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                        </div>
                        <div>
                            <div class="stat-label">Pending Loans</div>
                            <div class="stat-value" id="pendingLoansCount">0</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background: #dcfce7; color: #15803d;">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                        </div>
                        <div>
                            <div class="stat-label">System Volume</div>
                            <div class="stat-value" id="totalVolume">₦0</div>
                        </div>
                    </div>
                </div>

                <div class="grid-2">
                    <!-- Users Panel -->
                    <div class="panel">
                        <div class="panel-header">
                            <span class="panel-title">Manage Users</span>
                        </div>
                        <div class="panel-body" style="padding: 0;">
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th>User Details</th>
                                        <th>Status</th>
                                        <th>Role</th>
                                        <th>Action</th>
                                    </tr>
                                </thead>
                                <tbody id="usersList">
                                    <tr><td colspan="4" style="text-align:center;">Loading...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- Pending Loans Panel -->
                    <div class="panel">
                        <div class="panel-header">
                            <span class="panel-title">Pending Loans</span>
                        </div>
                        <div class="panel-body" style="padding: 0;">
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th>Loan ID</th>
                                        <th>Amount</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="loansList">
                                    <tr><td colspan="3" style="text-align:center;">Loading...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- Audit Logs Panel -->
                <div class="panel" style="margin-top: 1.5rem;">
                    <div class="panel-header">
                        <span class="panel-title">Database Audit Logs</span>
                    </div>
                    <div class="panel-body" style="padding: 0;">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Action</th>
                                    <th>Table & ID</th>
                                    <th>Changes (Old &rarr; New)</th>
                                    <th>User & Time</th>
                                </tr>
                            </thead>
                            <tbody id="auditList">
                                <tr><td colspan="4" style="text-align:center;">Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (localStorage.getItem('role') !== 'Admin') {
            alert("Access Denied: Admin privileges required.");
            window.location.href = '/dashboard.html';
        }

        document.addEventListener('DOMContentLoaded', () => {
            const userNameStr = localStorage.getItem('user_name') || 'Admin';
            document.getElementById('userName').textContent = userNameStr;
            const parts = userNameStr.split(' ');
            document.getElementById('userInitials').textContent = (parts[0][0] + (parts[1] ? parts[1][0] : '')).toUpperCase();
            loadAdminData();
        });

        async function loadAdminData() {
            try {
                // Load Users
                const userRes = await fetch('/api/admin/users', { headers: { 'Authorization': `Bearer ${token}` } });
                const userData = await userRes.json();
                if (userData.status === 'success') {
                    document.getElementById('totalUsers').textContent = userData.users.length;
                    const list = document.getElementById('usersList');
                    list.innerHTML = userData.users.map(u => `
                        <tr>
                            <td>
                                <div style="font-weight:600;">@${u.USERNAME}</div>
                                <div style="font-size:0.8rem; color:var(--text-muted);">${u.EMAIL}</div>
                            </td>
                            <td><span class="badge ${u.STATUS === 'Active' ? 'badge-success' : 'badge-danger'}">${u.STATUS}</span></td>
                            <td>${u.ROLE}</td>
                            <td>
                                <button class="btn btn-sm btn-ghost" onclick="updateStatus(${u.USER_ID}, '${u.STATUS === 'Active' ? 'Frozen' : 'Active'}')">
                                    ${u.STATUS === 'Active' ? 'Freeze' : 'Activate'}
                                </button>
                            </td>
                        </tr>
                    `).join('');
                }

                // Load Loans
                const loanRes = await fetch('/api/admin/loans', { headers: { 'Authorization': `Bearer ${token}` } });
                const loanData = await loanRes.json();
                if (loanData.status === 'success') {
                    const pending = loanData.loans.filter(l => l.STATUS === 'Pending');
                    document.getElementById('pendingLoansCount').textContent = pending.length;
                    const list = document.getElementById('loansList');
                    if (pending.length === 0) {
                        list.innerHTML = '<tr><td colspan="3" style="text-align:center;">No pending loans.</td></tr>';
                    } else {
                        list.innerHTML = pending.map(l => `
                            <tr>
                                <td>#${l.LOAN_ID}<br><span style="font-size:0.8rem; color:var(--text-muted);">User #${l.USER_ID}</span></td>
                                <td style="font-weight:700;">₦${l.AMOUNT.toLocaleString()}</td>
                                <td>
                                    <div style="display:flex; gap:0.5rem;">
                                        <button class="btn btn-sm btn-success" onclick="reviewLoan(${l.LOAN_ID}, 'Approved')">Approve</button>
                                        <button class="btn btn-sm btn-danger" onclick="reviewLoan(${l.LOAN_ID}, 'Rejected')">Reject</button>
                                    </div>
                                </td>
                            </tr>
                        `).join('');
                    }
                }

                // Load Transactions for Volume
                const txRes = await fetch('/api/admin/transactions', { headers: { 'Authorization': `Bearer ${token}` } });
                const txData = await txRes.json();
                if (txData.status === 'success') {
                    const total = txData.transactions.reduce((acc, t) => acc + t.AMOUNT, 0);
                    document.getElementById('totalVolume').textContent = '₦' + total.toLocaleString();
                }

                // Load True Enterprise Audit Logs
                const auditRes = await fetch('/api/admin/audit-logs', { headers: { 'Authorization': `Bearer ${token}` } });
                const auditData = await auditRes.json();
                if (auditData.status === 'success') {
                    const list = document.getElementById('auditList');
                    if (auditData.logs.length === 0) {
                        list.innerHTML = '<tr><td colspan="4" style="text-align:center;">No audit logs found.</td></tr>';
                    } else {
                        list.innerHTML = auditData.logs.map(l => `
                            <tr>
                                <td><span style="font-family:monospace; font-weight:600;">${l.ACTION_TYPE}</span></td>
                                <td><span style="font-family:monospace;">${l.TABLE_NAME}</span><br><span style="font-size:0.8rem; color:var(--text-muted);">ID: ${l.RECORD_ID || 'N/A'}</span></td>
                                <td>
                                    <div style="font-size:0.85rem; max-width:300px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">
                                        <span style="color:var(--danger);">${l.OLD_VALUE || 'None'}</span> &rarr;
                                        <span style="color:var(--secondary);">${l.NEW_VALUE || 'None'}</span>
                                    </div>
                                </td>
                                <td style="font-size:0.85rem;">
                                    ${l.PERFORMED_BY}<br>
                                    <span style="color:var(--text-muted);">${new Date(l.TIMESTAMP).toLocaleString()}</span>
                                </td>
                            </tr>
                        `).join('');
                    }
                }
            } catch(e) { console.error('Admin load error:', e); }
        }

        async function updateStatus(uid, status) {
            if(!confirm(`Change user status to ${status}?`)) return;
            await fetch('/api/admin/user/status', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ user_id: uid, status: status })
            });
            loadAdminData();
        }

        async function reviewLoan(lid, decision) {
            if(!confirm(`Are you sure you want to ${decision} this loan?`)) return;
            await fetch('/api/admin/loan/review', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ loan_id: lid, decision: decision })
            });
            loadAdminData();
        }

        function logout() { localStorage.clear(); window.location.href = '/login.html'; }
    </script>
</body>
</html>
