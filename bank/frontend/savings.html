<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Savings Goals | Vaultix Bank</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .goal-card {
            background: var(--bg-white);
            border-radius: 1rem;
            padding: 1.25rem;
            margin-bottom: 1rem;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
        }
        .progress-track {
            height: 8px;
            background: #e2e8f0;
            border-radius: 99px;
            overflow: hidden;
            margin: 0.75rem 0;
        }
        .progress-fill {
            height: 100%;
            border-radius: 99px;
            background: linear-gradient(90deg, var(--primary) 0%, var(--primary-light) 100%);
            transition: width 0.5s ease;
        }
        .goal-meta { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--text-muted); }
        .goal-actions { display: flex; gap: 0.5rem; margin-top: 1rem; }
        .goal-actions button {
            flex: 1; padding: 0.625rem; border: none; border-radius: 0.5rem;
            font-family: inherit; font-size: 0.8125rem; font-weight: 600; cursor: pointer;
        }
        .btn-add   { background: var(--primary); color: white; }
        .btn-del   { background: #fee2e2; color: #dc2626; }
        .empty-state {
            text-align: center; padding: 3rem 2rem; color: var(--text-muted);
        }
        .empty-icon {
            width: 64px; height: 64px; background: #f1f5f9; border-radius: 50%;
            display: inline-flex; align-items: center; justify-content: center;
            margin-bottom: 1rem;
        }

        /* Modal */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5); z-index: 2000; display: none;
            justify-content: center; align-items: flex-end;
        }
        .modal-overlay.active { display: flex; }
        .modal-sheet {
            background: var(--bg-white); width: 100%; max-width: 480px;
            border-radius: 1.5rem 1.5rem 0 0; padding: 2rem 1.5rem;
            transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
        }
        .modal-overlay.active .modal-sheet { transform: translateY(0); }
        .modal-title { font-size: 1.125rem; font-weight: 700; margin-bottom: 1.5rem; }
    </style>

    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark-mode');
            document.addEventListener('DOMContentLoaded', () => document.body.classList.add('dark-mode'));
        }
    </script>
</head>
<body>
    <div class="mobile-app">
        <div class="app-header">
            <a href="/dashboard.html" style="color: var(--text-dark); text-decoration: none; display: flex;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
            </a>
            <div class="header-title">Savings Goals</div>
            <button onclick="openCreate()" style="background: none; border: none; color: var(--primary); font-weight: 700; font-size: 1.5rem; cursor: pointer;">+</button>
        </div>

        <div class="content-area" style="padding-bottom: 2rem;" id="goalsList">
            <div class="empty-state">
                <div class="empty-icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                </div>
                <h3 style="font-size: 1rem; margin-bottom: 0.5rem; color: var(--text-dark);">No savings goals yet</h3>
                <p style="font-size: 0.875rem;">Tap <strong>+</strong> to create your first goal.</p>
            </div>
        </div>

        <!-- Create Goal Modal -->
        <div class="modal-overlay" id="createModal" onclick="closeCreate(event)">
            <div class="modal-sheet" onclick="event.stopPropagation()">
                <div class="modal-title">New Savings Goal</div>
                <div class="form-group">
                    <label>Goal Name</label>
                    <input type="text" id="goalName" placeholder="e.g. New Laptop, Rent">
                </div>
                <div class="form-group">
                    <label>Target Amount (₦)</label>
                    <input type="number" id="goalTarget" placeholder="100000" min="1000">
                </div>
                <button class="btn btn-primary" onclick="createGoal()">Create Goal</button>
            </div>
        </div>

        <!-- Add Funds Modal -->
        <div class="modal-overlay" id="addModal" onclick="closeAdd(event)">
            <div class="modal-sheet" onclick="event.stopPropagation()">
                <div class="modal-title">Add to <span id="addGoalName"></span></div>
                <div class="form-group">
                    <label>Amount to Save (₦)</label>
                    <input type="number" id="addAmount" placeholder="5000" min="100">
                </div>
                <button class="btn btn-primary" onclick="addFunds()">Save Now</button>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'vaultix_savings_goals';
        let activeGoalId = null;

        function getGoals() {
            try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
            catch { return []; }
        }
        function saveGoals(goals) { localStorage.setItem(STORAGE_KEY, JSON.stringify(goals)); }

        function render() {
            const goals = getGoals();
            const container = document.getElementById('goalsList');

            if (goals.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg></div>
                        <h3 style="font-size:1rem; margin-bottom:0.5rem; color:var(--text-dark);">No savings goals yet</h3>
                        <p style="font-size:0.875rem;">Tap <strong>+</strong> to create your first goal.</p>
                    </div>`;
                return;
            }

            container.innerHTML = goals.map(g => {
                const pct = Math.min(100, Math.round((g.saved / g.target) * 100));
                const done = pct >= 100;
                return `
                    <div class="goal-card">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <div style="font-weight:600; font-size:1rem;">${g.name}</div>
                            ${done ? '<span style="font-size:0.75rem; background:#dcfce7; color:#166534; padding:2px 8px; border-radius:99px; font-weight:600;">Reached!</span>' : ''}
                        </div>
                        <div class="progress-track"><div class="progress-fill" style="width:${pct}%;"></div></div>
                        <div class="goal-meta">
                            <span>₦${g.saved.toLocaleString()} saved</span>
                            <span>${pct}% of ₦${g.target.toLocaleString()}</span>
                        </div>
                        <div class="goal-actions">
                            <button class="btn-add" onclick="openAdd('${g.id}', '${g.name}')">+ Add Funds</button>
                            <button class="btn-del" onclick="deleteGoal('${g.id}')">Delete</button>
                        </div>
                    </div>`;
            }).join('');
        }

        function openCreate() {
            document.getElementById('createModal').style.display = 'flex';
            setTimeout(() => document.getElementById('createModal').classList.add('active'), 10);
        }
        function closeCreate(e) {
            if (e && e.target !== e.currentTarget) return;
            const m = document.getElementById('createModal');
            m.classList.remove('active');
            setTimeout(() => m.style.display = 'none', 300);
        }

        function createGoal() {
            const name = document.getElementById('goalName').value.trim();
            const target = parseFloat(document.getElementById('goalTarget').value);
            if (!name || !target || target < 1000) { alert('Enter a name and target (min ₦1,000)'); return; }

            const goals = getGoals();
            goals.push({ id: Date.now().toString(), name, target, saved: 0 });
            saveGoals(goals);
            document.getElementById('goalName').value = '';
            document.getElementById('goalTarget').value = '';
            closeCreate(true);
            render();
        }

        function openAdd(id, name) {
            activeGoalId = id;
            document.getElementById('addGoalName').textContent = name;
            document.getElementById('addModal').style.display = 'flex';
            setTimeout(() => document.getElementById('addModal').classList.add('active'), 10);
        }
        function closeAdd(e) {
            if (e && e !== true && e.target !== e.currentTarget) return;
            const m = document.getElementById('addModal');
            m.classList.remove('active');
            setTimeout(() => m.style.display = 'none', 300);
        }

        function addFunds() {
            const amount = parseFloat(document.getElementById('addAmount').value);
            if (!amount || amount < 100) { alert('Min ₦100'); return; }

            const goals = getGoals();
            const goal = goals.find(g => g.id === activeGoalId);
            if (goal) {
                goal.saved += amount;
                saveGoals(goals);
            }
            document.getElementById('addAmount').value = '';
            closeAdd(true);
            render();
        }

        function deleteGoal(id) {
            if (!confirm('Delete this savings goal?')) return;
            const goals = getGoals().filter(g => g.id !== id);
            saveGoals(goals);
            render();
        }

        // Fix modal close for programmatic calls
        function closeCreate(force) {
            const m = document.getElementById('createModal');
            m.classList.remove('active');
            setTimeout(() => m.style.display = 'none', 300);
        }
        function closeAdd(force) {
            const m = document.getElementById('addModal');
            m.classList.remove('active');
            setTimeout(() => m.style.display = 'none', 300);
        }

        document.addEventListener('DOMContentLoaded', render);
    </script>
</body>
</html>
