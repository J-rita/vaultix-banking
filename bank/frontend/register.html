<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Vaultix Bank</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body { 
            background: var(--bg-base); 
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem 0;
        }
        .login-wrap {
            width: 100%;
            max-width: 500px;
            background: var(--bg-white);
            border-radius: var(--radius);
            box-shadow: var(--shadow-md);
            padding: 2.5rem 2.5rem 3rem;
            border: 1px solid var(--border);
        }
        .logo-block {
            text-align: center;
            margin-bottom: 2rem;
        }
        .app-logo {
            width: 56px;
            height: 56px;
            background: var(--primary);
            color: white;
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.75rem;
            font-weight: 800;
            margin-bottom: 1rem;
        }
        .back-link {
            position: absolute;
            top: 2rem;
            left: 2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
            font-weight: 500;
            transition: color 0.2s;
        }
        .back-link:hover { color: var(--primary); }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .pwd-meter { height: 4px; border-radius: 4px; background: var(--border); margin-top: 0.5rem; overflow: hidden; }
        .pwd-fill  { height: 100%; border-radius: 4px; width: 0%; transition: width 0.3s, background 0.3s; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner {
            display: inline-block;
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        .msg {
            padding: 0.875rem 1rem;
            border-radius: var(--radius);
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 1.25rem;
            display: none;
        }
        .msg.success { background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; display: block; }
        .msg.error   { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; display: block; }
        .signin-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.875rem;
            color: var(--text-muted);
        }
        .signin-link a { color: var(--primary); font-weight: 600; text-decoration: none; }
    </style>

    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark-mode');
            document.addEventListener('DOMContentLoaded', () => document.body.classList.add('dark-mode'));
        }
    </script>
</head>
<body>
    <a href="/login.html" class="back-link">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back to Login
    </a>

    <div class="login-wrap">
        <div class="logo-block">
            <div class="app-logo">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            </div>
            <h1 style="font-size: 1.5rem; font-weight: 800; margin-bottom: 0.25rem;">Create an Account</h1>
            <p style="color: var(--text-muted); font-size: 0.95rem;">Join Vaultix and start banking smarter today.</p>
        </div>

        <div id="msg" class="msg"></div>

        <form id="regForm" autocomplete="off" novalidate>
            <div class="row">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" id="firstName" placeholder="First name" required>
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" id="lastName" placeholder="Last name" required>
                </div>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="Email address" required>
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="phoneNumber" placeholder="Phone number" required>
            </div>

            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Username" required autocomplete="new-username">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Min. 8 characters" required autocomplete="new-password" oninput="checkPwd(this.value)">
                <div class="pwd-meter"><div class="pwd-fill" id="pwdFill"></div></div>
            </div>

            <button type="submit" class="btn btn-primary btn-full" id="submitBtn">Create Account</button>
        </form>

        <div class="signin-link">
            Already have an account? <a href="/login.html">Sign In</a>
        </div>
    </div>

    <script>
        // Password strength meter
        function checkPwd(val) {
            const fill = document.getElementById('pwdFill');
            let score = 0;
            if (val.length >= 8)  score++;
            if (/[A-Z]/.test(val)) score++;
            if (/[0-9]/.test(val)) score++;
            if (/[^A-Za-z0-9]/.test(val)) score++;
            const pct   = [0, 25, 50, 75, 100][score];
            const color = ['', '#ef4444', '#f97316', '#eab308', '#10b981'][score];
            fill.style.width      = pct + '%';
            fill.style.background = color;
        }

        function showMsg(text, type) {
            const el = document.getElementById('msg');
            el.textContent = text;
            el.className   = 'msg ' + type;
        }

        document.getElementById('regForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');

            const firstName = document.getElementById('firstName').value.trim();
            const lastName  = document.getElementById('lastName').value.trim();
            const email     = document.getElementById('email').value.trim();
            const phone     = document.getElementById('phoneNumber').value.trim();
            const username  = document.getElementById('username').value.trim();
            const password  = document.getElementById('password').value;

            // Basic validation
            if (!firstName || !lastName || !email || !phone || !username || !password) {
                showMsg('Please fill in all fields.', 'error');
                return;
            }
            if (password.length < 8) {
                showMsg('Password must be at least 8 characters.', 'error');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Creating Account...';
            document.getElementById('msg').className = 'msg'; // hide

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        first_name: firstName,
                        last_name:  lastName,
                        email:      email,
                        phone_number: phone,
                        username:   username,
                        password:   password
                    })
                });

                const data = await res.json();

                if (data.status === 'success') {
                    showMsg('Account created successfully! Redirecting you to login...', 'success');
                    setTimeout(() => window.location.href = '/login.html', 2000);
                } else {
                    showMsg(data.detail || 'Registration failed. Please try again.', 'error');
                    btn.disabled = false;
                    btn.textContent = 'Create Account';
                }
            } catch (err) {
                showMsg('Could not connect to server. Is it running?', 'error');
                btn.disabled = false;
                btn.textContent = 'Create Account';
            }
        });
    </script>
</body>
</html>
