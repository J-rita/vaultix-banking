<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Vaultix</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark-mode');
            document.addEventListener('DOMContentLoaded', () => document.body.classList.add('dark-mode'));
        }
    </script>
</head>
<body>
    <div class="web-app">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                <span>Vaultix</span>
            </div>
            <nav class="sidebar-nav">
                <a href="/dashboard.html" class="nav-link active">
                    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                    Dashboard
                </a>
                <a href="/transfers.html" class="nav-link">
                    <svg viewBox="0 0 24 24"><path d="M17 3l.001 2c0 3.313-2.687 6-6 6H3"/><path d="M7 6L3 11l4 5"/><path d="M7 21l-.001-2c0-3.313 2.687-6 6-6h8"/><path d="M17 18l4-5-4-5"/></svg>
                    Transfers
                </a>
                <a href="/history.html" class="nav-link">
                    <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                    Transaction History
                </a>
                <a href="/analytics.html" class="nav-link">
                    <svg viewBox="0 0 24 24"><path d="M18 20V10M12 20V4M6 20v-6"></path></svg>
                    Analytics
                </a>
                <a href="/loans.html" class="nav-link">
                    <svg viewBox="0 0 24 24"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                    Loans
                </a>
            </nav>
            <div class="sidebar-footer">
                <button class="logout-btn" onclick="logout()">
                    <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    Logout
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-area">
            <!-- Topbar -->
            <header class="topbar">
                <div class="topbar-title" id="greeting">Good Morning, User</div>
                <div class="topbar-right">
                    <div style="text-align: right;">
                        <div class="topbar-name" id="userName">User</div>
                        <div class="topbar-role">Customer</div>
                    </div>
                    <div class="topbar-avatar" id="userInitials">U</div>
                </div>
            </header>

            <div class="page-content">
                <!-- Balance & Actions -->
                <div class="grid-2 mb-6">
                    <div class="balance-hero">
                        <div class="balance-label flex justify-between items-center">
                            <span>Total Balance</span>
                            <button onclick="toggleBalance()" id="toggleBtn" style="background:transparent; border:none; color:white; cursor:pointer;">
                                <svg id="eyeOpen" style="display:none;" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                                <svg id="eyeClosed" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                            </button>
                        </div>
                        <div class="balance-amount naira" id="balanceValue">••••••</div>
                        <div class="balance-account">Account: <span id="primaryAccNum">---</span></div>
                        
                        <div class="balance-actions">
                            <button class="balance-btn balance-btn-white" onclick="openAddMoney()">Deposit Funds</button>
                            <a href="/transfers.html" class="balance-btn balance-btn-ghost" style="text-decoration:none; display:inline-block; box-sizing:border-box;">Transfer Money</a>
                        </div>
                    </div>

                    <!-- Quick Actions -->
                    <div>
                        <h3 style="margin-bottom: 1rem; font-size: 1rem; font-weight: 700;">Quick Actions</h3>
                        <div class="quick-actions">
                            <div class="quick-action" onclick="openBill('Airtime Top-up', ['MTN','Airtel','Glo','9Mobile'])">
                                <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                                Airtime
                            </div>
                            <div class="quick-action" onclick="openBill('Data Bundle', ['MTN','Airtel','Glo','9Mobile'])">
                                <svg viewBox="0 0 24 24"><path d="M5 12.55a11 11 0 0 1 14.08 0"></path><path d="M1.42 9a16 16 0 0 1 21.16 0"></path><path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path><line x1="12" y1="20" x2="12.01" y2="20"></line></svg>
                                Data
                            </div>
                            <div class="quick-action" onclick="openBill('Electricity', ['IKEDC','EKEDC','AEDC'])">
                                <svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path></svg>
                                Electricity
                            </div>
                            <div class="quick-action" onclick="openBill('Cable TV', ['DSTV','GOtv','StarTimes'])">
                                <svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="15" rx="2" ry="2"></rect><polyline points="17 2 12 7 7 2"></polyline></svg>
                                Cable TV
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Recent Transactions -->
                <div class="panel" id="txSection">
                    <div class="panel-header">
                        <span class="panel-title">Recent Transactions</span>
                        <a href="/history.html" class="panel-link">View All</a>
                    </div>
                    <div class="panel-body" style="padding: 0;">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Transaction</th>
                                    <th>Date</th>
                                    <th>Status</th>
                                    <th class="text-right">Amount</th>
                                </tr>
                            </thead>
                            <tbody id="txList">
                                <tr><td colspan="4" style="text-align:center;">Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- Modals -->
    <!-- Add Money Modal -->
    <div id="addMoneyModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center;">
        <div style="background:var(--bg-white); width:100%; max-width:400px; border-radius:var(--radius); padding:2rem;">
            <h3 style="margin-bottom:1.5rem; font-size:1.25rem; font-weight:700;">Deposit Funds</h3>
            <div class="form-group">
                <label>Amount (₦)</label>
                <input type="number" id="depositAmount" placeholder="Enter amount">
            </div>
            <div style="display:flex; gap:1rem; margin-top:2rem;">
                <button class="btn btn-ghost" style="flex:1;" onclick="closeAddMoney()">Cancel</button>
                <button class="btn btn-primary" style="flex:1;" id="depositBtn" onclick="submitAddMoney()">Deposit</button>
            </div>
        </div>
    </div>

    <!-- Bill Payment Modal -->
    <div id="billModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center;">
        <div style="background:var(--bg-white); width:100%; max-width:400px; border-radius:var(--radius); padding:2rem;">
            <h3 id="billTitle" style="margin-bottom:1.5rem; font-size:1.25rem; font-weight:700;">Pay Bill</h3>
            
            <div class="form-group">
                <label>Provider</label>
                <select id="providerList" style="margin-bottom: 1rem;"></select>
            </div>

            <div class="form-group">
                <label>Account / Phone Number</label>
                <input type="text" id="billNumber" placeholder="Enter number">
            </div>

            <div class="form-group" id="amountGroup">
                <label>Amount (₦)</label>
                <input type="number" id="billAmount" placeholder="Enter amount">
            </div>

            <div class="form-group" id="dataPlanGroup" style="display:none;">
                <label>Select Plan</label>
                <select id="dataPlan">
                    <option value="100">100MB (1 Day) - ₦100</option>
                    <option value="500">1.5GB (30 Days) - ₦500</option>
                    <option value="1000">3GB (30 Days) - ₦1,000</option>
                </select>
            </div>

            <div style="display:flex; gap:1rem; margin-top:2rem;">
                <button class="btn btn-ghost" style="flex:1;" onclick="closeBill()">Cancel</button>
                <button class="btn btn-primary" style="flex:1;" id="payBtn" onclick="payBill()">Pay Now</button>
            </div>
        </div>
    </div>

    <script src="/static/js/dashboard.js?v=2"></script>
    <script>
        // Override the mobile loadMobileTransactions to render web table rows instead
        async function loadMobileTransactions() {
            const txList = document.getElementById('txList');
            if (!txList) return;

            try {
                const res = await fetch('/api/transactions/history', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();

                if (data.status === 'success') {
                    const recent = data.transactions.slice(0, 5); // show 5 on web
                    if (recent.length === 0) {
                        txList.innerHTML = '<tr><td colspan="4" style="text-align:center; padding: 2rem;">No transactions yet</td></tr>';
                        return;
                    }

                    txList.innerHTML = recent.map(tx => {
                        const isCredit = tx.TRANSACTION_TYPE === 'Deposit' ||
                                         tx.TRANSACTION_TYPE === 'Transfer_In' ||
                                         tx.TRANSACTION_TYPE.includes('Loan');
                        const colorClass = isCredit ? 'text-success' : 'text-dark';
                        const sign = isCredit ? '+' : '-';
                        const date = new Date(tx.CREATED_AT).toLocaleString();
                        
                        return `
                            <tr>
                                <td>
                                    <div style="font-weight:600;">${tx.TRANSACTION_TYPE}</div>
                                    <div style="font-size:0.8rem; color:var(--text-muted);">${tx.DESCRIPTION || ''}</div>
                                </td>
                                <td>${date}</td>
                                <td><span class="badge badge-success">Completed</span></td>
                                <td class="text-right fw-700 ${colorClass}">${sign}₦${tx.AMOUNT.toLocaleString()}</td>
                            </tr>
                        `;
                    }).join('');
                }
            } catch (err) {
                console.error('Error loading history:', err);
            }
        }

        // Override openBill to use a standard select dropdown for providers instead of pills
        function openBill(title, providers) {
            currentBillType = title;
            selectedProvider = null;
            document.getElementById('billTitle').textContent = title;
            document.getElementById('billNumber').value = '';
            document.getElementById('billAmount').value = '';

            const amountGroup = document.getElementById('amountGroup');
            const dataPlanGroup = document.getElementById('dataPlanGroup');

            if (title === 'Data Bundle') {
                amountGroup.style.display = 'none';
                dataPlanGroup.style.display = 'block';
            } else {
                amountGroup.style.display = 'block';
                dataPlanGroup.style.display = 'none';
            }

            const select = document.getElementById('providerList');
            select.innerHTML = '<option value="">Select Provider...</option>' + 
                providers.map(p => `<option value="${p}">${p}</option>`).join('');

            select.onchange = (e) => { selectedProvider = e.target.value; };

            const modal = document.getElementById('billModal');
            modal.style.display = 'flex';
        }

        function closeBill() {
            document.getElementById('billModal').style.display = 'none';
        }

        function closeAddMoney() {
            document.getElementById('addMoneyModal').style.display = 'none';
        }
    </script>
</body>
</html>
