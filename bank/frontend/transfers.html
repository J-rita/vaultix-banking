<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfers | Vaultix</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark-mode');
            document.addEventListener('DOMContentLoaded', () => document.body.classList.add('dark-mode'));
        }
    </script>
</head>
<body>
    <div class="web-app">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                <span>Vaultix</span>
            </div>
            <nav class="sidebar-nav">
                <a href="/dashboard.html" class="nav-link">
                    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                    Dashboard
                </a>
                <a href="/transfers.html" class="nav-link active">
                    <svg viewBox="0 0 24 24"><path d="M17 3l.001 2c0 3.313-2.687 6-6 6H3"/><path d="M7 6L3 11l4 5"/><path d="M7 21l-.001-2c0-3.313 2.687-6 6-6h8"/><path d="M17 18l4-5-4-5"/></svg>
                    Transfers
                </a>
                <a href="/history.html" class="nav-link">
                    <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                    Transaction History
                </a>
                <a href="/analytics.html" class="nav-link">
                    <svg viewBox="0 0 24 24"><path d="M18 20V10M12 20V4M6 20v-6"></path></svg>
                    Analytics
                </a>
                <a href="/loans.html" class="nav-link">
                    <svg viewBox="0 0 24 24"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                    Loans
                </a>
            </nav>
            <div class="sidebar-footer">
                <button class="logout-btn" onclick="logout()">
                    <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    Logout
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-area">
            <!-- Topbar -->
            <header class="topbar">
                <div class="topbar-title">Transfers</div>
                <div class="topbar-right">
                    <div style="text-align: right;">
                        <div class="topbar-name" id="userName">User</div>
                        <div class="topbar-role">Customer</div>
                    </div>
                    <div class="topbar-avatar" id="userInitials">U</div>
                </div>
            </header>

            <div class="page-content">
                <div class="grid-2">
                    <!-- Transfer Form Panel -->
                    <div class="panel">
                        <div class="panel-header">
                            <span class="panel-title">Send Money Securely</span>
                        </div>
                        <div class="panel-body">
                            <form id="transferForm">
                                <div class="form-group">
                                    <label>Recipient Account Number</label>
                                    <input type="tel" id="toAccount" placeholder="10-digit account number" maxlength="10" required oninput="verifyAccount(this.value)" style="font-size: 1.1rem; letter-spacing: 1px;">
                                    <div id="accountNamePreview" style="margin-top: 0.5rem; font-size: 0.85rem; min-height: 1.25rem;"></div>
                                </div>
                                
                                <div class="form-group">
                                    <label>Amount (₦)</label>
                                    <input type="number" id="amount" placeholder="0.00" min="50" required style="font-size: 1.5rem; font-weight: 700; color: var(--primary);">
                                </div>
                                
                                <div class="form-group">
                                    <label>Description (Optional)</label>
                                    <input type="text" id="description" placeholder="What's this transfer for?">
                                </div>

                                <div class="form-group">
                                    <label>🔒 Transaction PIN</label>
                                    <input type="password" id="transactionPin" placeholder="Enter your 4-digit PIN" maxlength="4" inputmode="numeric" required style="letter-spacing: 4px; font-size: 1.2rem; font-weight: 700;">
                                </div>

                                <div style="margin-top: 2rem;">
                                    <button type="submit" class="btn btn-primary btn-full" id="transferBtn">Transfer Funds</button>
                                </div>
                            </form>
                        </div>
                    </div>

                    <!-- Info Panel -->
                    <div class="panel" style="background: var(--bg-app); border: none;">
                        <div class="panel-body" style="display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; height: 100%;">
                            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="1.5" style="margin-bottom: 1.5rem;"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                            <h3 style="margin-bottom: 0.5rem; font-size: 1.25rem;">Vaultix Shield Active</h3>
                            <p style="color: var(--text-muted); font-size: 0.95rem; max-width: 300px;">All transfers are processed in real-time, secured with 256-bit encryption, and protected by ACID database compliance.</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/login.html';
        
        function logout() {
            localStorage.clear();
            window.location.href = '/login.html';
        }

        // Set topbar name if stored
        document.addEventListener('DOMContentLoaded', () => {
            const userNameStr = localStorage.getItem('user_name') || 'User';
            document.getElementById('userName').textContent = userNameStr;
            const parts = userNameStr.split(' ');
            document.getElementById('userInitials').textContent = (parts[0][0] + (parts[1] ? parts[1][0] : '')).toUpperCase();
        });

        let userAccountId = null;
        async function loadAccounts() {
            try {
                const res = await fetch('/api/accounts/my-accounts', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.status === 'success' && data.accounts.length > 0) {
                    userAccountId = data.accounts[0].ACCOUNT_ID;
                }
            } catch(e) {}
        }

        let verifyTimer = null;
        async function verifyAccount(val) {
            const preview = document.getElementById('accountNamePreview');
            const btn = document.getElementById('transferBtn');
            if (val.length < 10) {
                preview.textContent = '';
                btn.disabled = false;
                return;
            }
            preview.innerHTML = '<span class="text-muted">Verifying account...</span>';
            btn.disabled = true; // Disable button while verifying
            
            clearTimeout(verifyTimer);
            verifyTimer = setTimeout(async () => {
                try {
                    const res = await fetch(`/api/accounts/verify?account_number=${val}`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const data = await res.json();
                    if (data.status === 'success') {
                        preview.innerHTML = `<span class="text-success fw-700">&#10003; ${data.account_name}</span>`;
                        btn.disabled = false;
                    } else {
                        preview.innerHTML = `<span class="text-danger fw-700">&#10007; Account not found</span>`;
                    }
                } catch(e) {
                    preview.innerHTML = '';
                    btn.disabled = false;
                }
            }, 400);
        }

        document.getElementById('transferForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('transferBtn');
            btn.disabled = true;
            btn.textContent = 'Processing...';

            const payload = {
                sender_account_id: userAccountId,
                receiver_account_number: document.getElementById('toAccount').value,
                amount: document.getElementById('amount').value,
                description: document.getElementById('description').value || 'Funds Transfer',
                transaction_pin: document.getElementById('transactionPin').value.trim()
            };

            try {
                const res = await fetch('/api/transactions/transfer', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(payload)
                });
                const result = await res.json();
                if (result.status === 'success') {
                    alert('Transfer Successful!');
                    window.location.href = '/dashboard.html';
                } else {
                    alert("Error: " + result.detail);
                    btn.disabled = false;
                    btn.textContent = 'Transfer Funds';
                }
            } catch (err) {
                alert("Network error.");
                btn.disabled = false;
                btn.textContent = 'Transfer Funds';
            }
        });

        document.addEventListener('DOMContentLoaded', loadAccounts);
    </script>
</body>
</html>
